name: Daily Quote Video Automation

on:
  schedule:

      # Run 5 times a day (Every 4 hours and 48 minutes if evenly spaced, or pick 5 specific hours)
     # This example runs every day at 00:00, 05:00, 10:00, 15:00, and 20:00 UTC:
        - cron: '0 0,5,10,15,20 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial for git push to work
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history for better pulling
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Enable pip caching
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-dejavu-core fonts-liberation
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env file
        run: |
          cat > .env << EOF
          # Core AI
          POLLINATIONS_API_KEY=${{ secrets.POLLINATIONS_API_KEY }}
          AI_MODEL=${{ secrets.AI_MODEL }}

          # YouTube credentials
          YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YT_CLIENT_ID=${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET=${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN=${{ secrets.YT_REFRESH_TOKEN }}
          
          # Facebook & Meta credentials
          FACEBOOK_PAGE_ID=${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN=${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FB_PAGE_ID=${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN=${{ secrets.FB_ACCESS_TOKEN }}
          META_USER_ACCESS_TOKEN=${{ secrets.META_USER_ACCESS_TOKEN }}
          
          # Instagram credentials
          INSTAGRAM_ACCOUNT_ID=${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IG_USER_ID=${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}
          
          # Threads credentials
          THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
          
          # Twitter/X credentials
          TWITTER_API_KEY=${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET=${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN=${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET=${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER_TOKEN=${{ secrets.TWITTER_BEARER_TOKEN }}
          
          # VK credentials
          VK_APP_ID=${{ secrets.VK_APP_ID }}
          VK_ACCESS_TOKEN=${{ secrets.VK_ACCESS_TOKEN }}
          VK_GROUP_ID=${{ secrets.VK_GROUP_ID }}
          VK_SECURE_KEY=${{ secrets.VK_SECURE_KEY }}

          # Telegram credentials
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}

          # TikTok credentials
          TIKTOK_ACCESS_TOKEN=${{ secrets.TIKTOK_ACCESS_TOKEN }}
          EOF
      
      - name: Run automation
        run: |
          python automate_daily_post.py
      
      - name: Generate Job Summary
        if: always()
        run: |
          echo "## 📊 Social Media Upload Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f output/upload_results.json ]; then
            python -c "
          import json
          try:
              with open('output/upload_results.json', 'r') as f:
                  data = json.load(f)
              print('| Platform | Status | Detail |')
              print('|----------|--------|--------|')
              for platform, result in data.get('platforms', {}).items():
                  status = result.get('status', 'unknown').upper()
                  icon = '✅' if status == 'SUCCESS' else ('⚠️' if status == 'SKIPPED' else '❌')
                  detail = result.get('error') or result.get('result', {}).get('reason') or '-'
                  print(f'| {icon} {platform.capitalize()} | **{status}** | {detail} |')
          except Exception as e:
              print(f'Error parsing results: {e}')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No result file found. The script might have crashed." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload-results
          path: |
            output/upload_results.json
            output/*.mp4
          retention-days: 7
      
      - name: Commit tracking data
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add used_quotes_psychology.txt used_music.txt used_quotes.txt psychologyscrolls.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update tracking history [skip ci]" && git pull --rebase --autostash origin main && git push origin main)
